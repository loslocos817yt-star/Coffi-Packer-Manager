<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffi - Gestor de Librerías para B++</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 4px; }
        .hero { background: #2c3e50; color: white; padding: 2rem; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Coffi</h1>
        <p>El gestor de paquetes oficial para el lenguaje B++.</p>
    </div>

    <section>
        <h2>Instalación</h2>
        <p>Para instalar una nueva librería, simplemente ejecuta:</p>
        <code>coffi install nombre_libreria</code>
    </section>

    <footer>
        <p><small>Hecho con amor para Coffi (el perro) y para B++.</small></p>
    </footer>

</body>
</html>
