<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffi - Gestor de Librerías para B++</title>
    
    <style>
        /* Estilo Retro-Moderno */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #C0C0C0; 
            color: #000; 
            line-height: 1.4; 
            margin: 0; 
            padding: 10px; 
        }

        .container {
            max-width: 600px; 
            margin: 0 auto; 
            background: #FFFFFF; 
            border: 2px outset #808080; 
            padding: 15px;
        }

        .hero { 
            background: #000080; 
            color: #FFFF00; 
            padding: 1rem; 
            text-align: center; 
            border: 2px inset #555;
        }

        .coffi-img { 
            max-width: 150px; 
            border-radius: 50%; 
            border: 4px solid #FFFF00; 
            margin-bottom: 10px;
        }

        code { 
            background: #000; 
            color: #0F0; 
            padding: 10px; 
            display: block; 
            margin: 10px 0;
            overflow-x: auto; /* Para que el código no rompa el móvil */
            font-weight: bold;
        }

        footer { 
            margin-top: 20px; 
            border-top: 2px groove #808080; 
            padding-top: 10px; 
            font-size: 0.8rem;
            text-align: center;
        }

        /* Responsive para que no sufras en el celular */
        @media (max-width: 480px) {
            .container { border: none; padding: 5px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <img src="img/coffi.png" alt="Coffi el perro" class="coffi-img">
        <h1>Coffi v1.0</h1>
        <p>Gestor de paquetes para B++ (Android/Termux)</p>
    </div>

    <section>
        <h2>Instalación</h2>
        <p>Ejecuta esto en tu terminal:</p>
        <code>./B++_1.0_linux_arm64 <br> coffi install nombre_libreria</code>
    </section>

    <footer>
        <p>Hecho con amor en Termux.</p>
        <p>¿Tienes librerías? Mándalas a:<br>
        <a href="mailto:loslocos817yt@gmail.com">loslocos817yt@gmail.com</a></p>
    </footer>
</div>

</body>
</html>
