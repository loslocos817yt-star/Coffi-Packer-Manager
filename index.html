<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffi - Gestor de Librerías (Estilo XP)</title>
    <style>
        body { background-color: #008080; font-family: 'Tahoma', sans-serif; padding: 20px; }
        .window { background-color: #ECE9D8; border: 2px outset #FFF; width: 100%; max-width: 600px; margin: 0 auto; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        .title-bar { background: linear-gradient(to right, #0058E6, #3A93FF); color: #FFF; padding: 3px 10px; font-weight: bold; display: flex; justify-content: space-between; }
        .content { padding: 20px; }
        .hero { text-align: center; border-bottom: 2px groove #808080; padding-bottom: 15px; margin-bottom: 20px; }
        .coffi-img { max-width: 100px; border: 2px inset #555; }
        .libreria-box { background: #FFF; border: 1px inset #808080; padding: 10px; margin: 10px 0; display: flex; align-items: center; }
        .icon-lib { width: 32px; height: 32px; margin-right: 15px; }
        code { background: #000; color: #0F0; padding: 5px 10px; display: block; margin-top: 5px; font-family: 'Courier New', monospace; }
        .btn-descarga { display: block; width: 100%; padding: 10px; background: #ECE9D8; border: 2px outset #FFF; font-weight: bold; text-align: center; text-decoration: none; color: #000; margin-top: 20px; }
        .btn-descarga:active { border-style: inset; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>Coffi Manager</span>
        <span>[X]</span>
    </div>
    
    <div class="content">
        <div class="hero">
            <img src="https://raw.githubusercontent.com/loslocos817yt-star/Coffi-Packer-Manager/main/img/coffi.png" alt="Coffi" class="coffi-img">
            <h1>Coffi v1.0</h1>
        </div>

        <section>
            <h2>Librerías Oficiales</h2>
            <div id="lista-librerias">Cargando...</div>
        </section>

        <a href="https://github.com/loslocos817yt-star/Bpp/raw/refs/heads/main/Descargas/Termux/b++%201.0" class="btn-descarga">
            Descarga B++ 1.0
        </a>
    </div>
</div>

<script>
    async function cargarLibrerias() {
        const url = 'https://raw.githubusercontent.com/loslocos817yt-star/Coffi-Packer-Manager/refs/heads/main/Librerias/Oficiales.json';
        try {
            const respuesta = await fetch(url);
            const datos = await respuesta.json();
            const contenedor = document.getElementById('lista-librerias');
            contenedor.innerHTML = '';

            datos.forEach(lib => {
                const div = document.createElement('div');
                div.className = 'libreria-box';
                div.innerHTML = `
                    <img src="https://raw.githubusercontent.com/loslocos817yt-star/Coffi-Packer-Manager/main/img/favicon.png" class="icon-lib">
                    <div>
                        <strong>${lib.paquete}</strong>
                        <code>coffi install ${lib.paquete}</code>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        } catch (e) {
            document.getElementById('lista-librerias').innerText = 'Error al conectar con el servidor.';
        }
    }
    cargarLibrerias();
</script>

</body>
</html>
