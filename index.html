<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- El "initial-scale=1.0" es lo que evita que la web se vea en miniatura -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coffi - Gestor de Librerías para B++</title>
    
    <style>
        /* Reset para que no haya márgenes raros */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #C0C0C0; 
            color: #000; 
            margin: 0; 
            padding: 10px;
            /* Tamaño de fuente grande para que no sufras */
            font-size: 18px; 
            line-height: 1.5;
        }

        .container {
            max-width: 600px; 
            margin: 0 auto; 
            background: #FFFFFF; 
            border: 3px outset #808080; 
            padding: 20px;
        }

        .hero { 
            background: #000080; 
            color: #FFFF00; 
            padding: 20px; 
            text-align: center; 
            border: 2px inset #555;
            margin-bottom: 20px;
        }

        .coffi-img { 
            max-width: 120px; 
            border-radius: 50%; 
            border: 4px solid #FFFF00; 
        }

        code { 
            background: #000; 
            color: #0F0; 
            padding: 15px; 
            display: block; 
            margin: 15px 0;
            overflow-x: auto;
            font-weight: bold;
            font-size: 16px; /* Ajustado para que no se desborde */
        }

        h1 { font-size: 24px; margin: 10px 0; }
        h2 { font-size: 20px; color: #800000; border-bottom: 1px solid #800000; }

        footer { 
            margin-top: 30px; 
            border-top: 2px groove #808080; 
            padding-top: 15px; 
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <img src="img/coffi.png" alt="Coffi el perro" class="coffi-img">
        <h1>Coffi v1.0</h1>
        <p>Gestor para B++ (Android/Termux)</p>
    </div>

    <section>
        <h2>Instalación</h2>
        <p>Ejecuta en tu terminal:</p>
        <code>./'B++ 1.0' <br> coffi install nombre_libreria</code>
    </section>

    <footer>
        <p>Hecho para B++ y Coffi (el perro).<br>
        ¿Tienes librerías? Mándalas a:<br>
        <a href="mailto:loslocos817yt@gmail.com">loslocos817yt@gmail.com</a></p>
    </footer>
</div>

</body>
</html>
